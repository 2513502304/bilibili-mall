name: Crawl Bilibili Mall Data

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      reset_data:
        description: "Ignore the existing release data and rebuild the jsonl from scratch"
        required: false
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: bmall-crawl-data
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GH_TOKEN: ${{ github.token }}
      BMALL_COOKIE: ${{ secrets.BMALL_COOKIE }}
      BMALL_PROXY: ${{ secrets.BMALL_PROXY }}
      HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
      HTTPS_PROXY: ${{ secrets.HTTPS_PROXY }}
      BMALL_MAX_RETRIES: "10"
      BMALL_SLEEP_MIN: "1.25"
      BMALL_SLEEP_MAX: "1.5"
      BMALL_DATA_RETENTION_DAYS: "15"
      RESET_DATA: ${{ github.event_name != 'workflow_dispatch' || inputs.reset_data }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python
        run: uv python install 3.14

      - name: Restore latest data
        run: |
          mkdir -p Data /tmp/bmall-release
          if [ "$RESET_DATA" = "true" ]; then
            echo "Skipping release data restore because reset_data=true"
            exit 0
          fi
          if gh release download data-latest --pattern bmall_all_data.jsonl.gz --dir /tmp/bmall-release; then
            gzip -cd /tmp/bmall-release/bmall_all_data.jsonl.gz > Data/bmall_all_data.jsonl
          else
            echo "No previous release data found; starting from an empty dataset"
          fi

      - name: Crawl data
        run: uv run python -m scripts.crawl_bmall_data

      - name: Compress latest data
        run: gzip -c Data/bmall_all_data.jsonl > Data/bmall_all_data.jsonl.gz

      - name: Publish latest data release
        run: |
          if ! gh release view data-latest >/dev/null 2>&1; then
            gh release create data-latest \
              --title "Latest Bilibili Mall data" \
              --notes "This release stores the latest compressed jsonl generated by the scheduled crawler."
          fi
          gh release upload data-latest Data/bmall_all_data.jsonl.gz --clobber
